<!-- SCRIPT -->
<script>

let count = localStorage.getItem("clicks") || 0;
document.getElementById("compteur").innerText = count;

function compter() {
  count++;
  localStorage.setItem("clicks", count);
  document.getElementById("compteur").innerText = count;
}

</script>
