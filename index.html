
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeremie App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            max-width: 350px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #38bdf8;
        }

        h2 {
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .tiktok {
            background: black;
            color: white;
        }

        .whatsapp {
            background: #25D366;
            color: white;
        }

        .counter {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="card">

    <img src="jeremie.jpg" alt="Photo">

    <h2>@jeremielungele</h2>

    <button class="tiktok" onclick="openTikTok()">S’abonner sur TikTok</button>

    <button class="whatsapp" onclick="openWhatsApp()">Me contacter WhatsApp</button>

    <div class="counter">
        Nombre de clics : <span id="count">0</span>
    </div>

</div>

<script>
    let count = 0;

    function openTikTok() {
        count++;
        document.getElementById("count").innerText = count;

        // Ouvre TikTok
        window.open("https://www.tiktok.com/@jeremielungele", "_blank");
    }

    function openWhatsApp() {
        count++;
        document.getElementById("count").innerText = count;

        // Ouvre WhatsApp Business
        window.open("https://wa.me/243977658776", "_blank");
    }
</script>

</body>
</html>
