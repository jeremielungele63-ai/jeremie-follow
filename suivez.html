<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivez-moi</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Animation -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    body {
      background: linear-gradient(135deg, #000000, #ff0050);
      color: white;
      text-align: center;
    }

    .btn-custom {
      width: 80%;
      margin: 10px auto;
      font-size: 18px;
      padding: 12px;
      border-radius: 30px;
    }

    .profil {
      width:150px;
      height:150px;
      object-fit:cover;
      border-radius:50%;
      border:3px solid white;
    }
  </style>

</head>

<body>

<div class="container mt-5 animate__animated animate__fadeIn">

  <!-- IMAGE -->
  <img src="jeremie.jpg" class="profil shadow">

  <h2 class="mt-3">🔥 Jeremie Officiel</h2>

  <p>Développeur | Créateur de contenu 🎬</p>

  <!-- COMPTEUR -->
  <h4 id="clicks">0 clics</h4>

  <!-- BOUTON TIKTOK -->
  <a href="https://www.tiktok.com/@jeremielungele"
     target="_blank"
     onclick="compter()"
     class="btn btn-danger btn-custom shadow">
     🎵 Suivez-moi sur TikTok
  </a>

  <!-- BOUTON WHATSAPP -->
  <a href="https://wa.me/243977658776?text=Salut%20je%20viens%20de%20ton%20site"
     target="_blank"
     onclick="compter()"
     class="btn btn-success btn-custom shadow">
     📞 Écris-moi sur WhatsApp
  </a>

  <!-- BOUTON PARTAGE -->
  <button onclick="partager()" class="btn btn-light btn-custom shadow">
     🔥 Partager cette page
  </button>

</div>

<script>

// compteur sauvegardé
let clicks = localStorage.getItem("viralClicks") || 0;
document.getElementById("clicks").innerText = clicks + " clics";

function compter() {
  clicks++;
  localStorage.setItem("viralClicks", clicks);
  document.getElementById("clicks").innerText = clicks + " clics";
}

// partage
function partager() {
  let url = window.location.href;

  navigator.clipboard.writeText(url);

  alert("Lien copié 🔥 partage maintenant !");
}

</script>

</body>
</html>
