<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Animation -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card p-4 shadow animate__animated animate__fadeIn">

    <h2 class="text-center mb-3">📞 Contactez-moi</h2>

    <p class="text-center text-muted">
      Besoin d’un site web ou d’une application ? Écrivez-moi 👇
    </p>

    <!-- MESSAGE SUCCESS -->
    <div id="successMessage" class="alert alert-success d-none">
      ✅ Message envoyé avec succès !
    </div>

    <!-- FORMULAIRE -->
    <form id="contactForm" action="https://formsubmit.co/jeremielungele63@gmail.com" method="POST">

      <!-- Anti-spam -->
      <input type="hidden" name="_captcha" value="false">

      <div class="mb-3">
        <label>Nom</label>
        <input type="text" name="name" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Message</label>
        <textarea name="message" class="form-control" rows="4" required></textarea>
      </div>

      <button class="btn btn-primary w-100">📨 Envoyer</button>

    </form>

    <!-- WHATSAPP -->
    <div class="text-center mt-4">
      <p>Ou contactez-moi directement :</p>

      <a href="https://wa.me/243977658776?text=Bonjour%20Jeremie%2C%20je%20veux%20un%20site"
         class="btn btn-success shadow">
         📲 WhatsApp rapide
      </a>
    </div>

  </div>

</div>

<!-- SCRIPT CONFIRMATION -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(){
  document.getElementById("successMessage").classList.remove("d-none");
});
</script>

</body>
</html>
